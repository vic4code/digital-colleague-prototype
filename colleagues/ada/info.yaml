# INFO — Ada's declared business identities and local channel policy.
#
# Phase 0 authenticates Gmail/Outlook Email, Google/Outlook Calendar, Notion,
# and Slack with their official Codex/ChatGPT OAuth connectors. OAuth sessions,
# passwords, tokens, and connector account state never live in this file.

accounts:
  # Human-readable identity only; the official Gmail connector owns OAuth.
  gmail:
    provider: gmail
    address: cathayaids@gmail.com
    label: "Ada — Gmail inbox"

  # Human-readable identity only; the official Slack connector owns OAuth.
  slack:
    provider: slack
    address: "@ada"
    label: "ACME workspace"

channels:
  # Local/dev presence — always available, no credentials.
  - kind: console
    policy: open

  # Workspace access is invoked through official Codex plugins, not these
  # legacy in-process channel adapters.

# Coarse business-level authorization (RBAC) scopes for the control plane.
permissions:
  - contracts:read
  - contracts:redline
  - board:write
  - email:draft
  - email:reply:owner    # constrained by policies/email-automation.json
