name: digital-colleague-openclaw

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
    init: true
    user: "${OPENCLAW_UID:-1000}:${OPENCLAW_GID:-1000}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /workspace/colleagues/ada
      OPENCLAW_ADA_WORKSPACE: /workspace/colleagues/ada
      DIGITAL_COLLEAGUE_REPO_ROOT: /workspace
      OPENCLAW_DISABLE_BONJOUR: "1"
      NPM_CONFIG_CACHE: /home/node/.openclaw/npm-cache
      TZ: Asia/Taipei
    volumes:
      - ${OPENCLAW_HOST_STATE_DIR:-../../.state/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_HOST_AUTH_SECRET_DIR:-../../.state/openclaw-home/.config/openclaw}:/home/node/.config/openclaw
      - ../../colleagues/ada:/workspace/colleagues/ada:ro
      - ../../plugins/digital-colleague-workspace/resources/safety-boundary.md:/workspace/plugins/digital-colleague-workspace/resources/safety-boundary.md:ro
    ports:
      - 127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789
      - 127.0.0.1:${OPENCLAW_INGRESS_PORT:-18890}:18890
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
    profiles:
      - tools
    init: true
    user: "${OPENCLAW_UID:-1000}:${OPENCLAW_GID:-1000}"
    stdin_open: true
    tty: true
    network_mode: service:openclaw-gateway
    env_file:
      - path: .env
        required: true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /workspace/colleagues/ada
      OPENCLAW_ADA_WORKSPACE: /workspace/colleagues/ada
      DIGITAL_COLLEAGUE_REPO_ROOT: /workspace
      OPENCLAW_DISABLE_BONJOUR: "1"
      NPM_CONFIG_CACHE: /home/node/.openclaw/npm-cache
      TZ: Asia/Taipei
    volumes:
      - ${OPENCLAW_HOST_STATE_DIR:-../../.state/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_HOST_AUTH_SECRET_DIR:-../../.state/openclaw-home/.config/openclaw}:/home/node/.config/openclaw
      - ../../colleagues/ada:/workspace/colleagues/ada:ro
      - ../../plugins/digital-colleague-workspace/resources/safety-boundary.md:/workspace/plugins/digital-colleague-workspace/resources/safety-boundary.md:ro
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    entrypoint:
      - node
      - dist/index.js
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  event-ingress:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    network_mode: service:openclaw-gateway
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    tmpfs:
      - /config:uid=1000,gid=1000,mode=0700
      - /data:uid=1000,gid=1000,mode=0700
    depends_on:
      openclaw-gateway:
        condition: service_healthy
